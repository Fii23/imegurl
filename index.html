<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Upload</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f1117,#243b55);
color:white;
text-align:center;
}

.container{
max-width:800px;
margin:auto;
padding:60px 20px;
}

h1{
font-size:38px;
}

.upload-box{
border:2px dashed #444;
padding:60px;
border-radius:15px;
cursor:pointer;
margin-top:30px;
}

.upload-box:hover{
background:#161b22;
}

.progress{
width:100%;
height:10px;
background:#1a1f2b;
border-radius:20px;
margin-top:20px;
overflow:hidden;
display:none;
}

.progress-bar{
height:100%;
width:0%;
background:#1ce783;
}

.preview{
margin-top:30px;
display:none;
}

.preview img{
max-width:100%;
border-radius:10px;
}

.urlbox{
margin-top:20px;
display:none;
}

.urlbox input{
width:70%;
padding:10px;
border:none;
border-radius:8px;
background:#1a1f2b;
color:white;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
}

.copybtn{
background:#6ea8ff;
color:white;
}

.deletebtn{
background:#ff4d4d;
color:white;
margin-top:15px;
}

footer{
margin-top:100px;
color:#888;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Image to URL</h1>

<div class="upload-box" id="dropBox">
<p>Drag & Drop Image<br>or Click Upload</p>
<input type="file" id="picker" accept="image/*" hidden>
</div>

<div class="progress" id="progressBox">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="preview" id="preview">
<img id="img">
<br>
<button class="deletebtn" id="deleteBtn">Delete</button>
</div>

<div class="urlbox" id="urlbox">
<input type="text" id="url">
<button class="copybtn" id="copyBtn">Copy</button>
</div>

</div>

<footer>
© Pei kemarin sore
</footer>

<script>

let picker=document.getElementById("picker")
let dropBox=document.getElementById("dropBox")

dropBox.onclick=()=>picker.click()

dropBox.ondragover=(e)=>{
e.preventDefault()
}

dropBox.ondrop=(e)=>{
e.preventDefault()
handleFile(e.dataTransfer.files[0])
}

picker.onchange=()=>{
handleFile(picker.files[0])
}

function handleFile(file){

let formData=new FormData()
formData.append("file",file)

let xhr=new XMLHttpRequest()

xhr.open("POST","/api/upload")

xhr.upload.onprogress=(e)=>{

if(e.lengthComputable){

let percent=(e.loaded/e.total)*100

document.getElementById("progressBox").style.display="block"
document.getElementById("progressBar").style.width=percent+"%"

}

}

xhr.onload=()=>{

let res=JSON.parse(xhr.responseText)

document.getElementById("preview").style.display="block"
document.getElementById("img").src=res.url

document.getElementById("urlbox").style.display="block"
document.getElementById("url").value=res.url

}

xhr.send(formData)

}

document.getElementById("copyBtn").onclick=function(){

navigator.clipboard.writeText(
document.getElementById("url").value
)

this.innerText="Copied"

setTimeout(()=>{
this.innerText="Copy"
},2000)

}

document.getElementById("deleteBtn").onclick=function(){

document.getElementById("preview").style.display="none"
document.getElementById("urlbox").style.display="none"
document.getElementById("img").src=""
document.getElementById("url").value=""

}

</script>

</body>
</html>
